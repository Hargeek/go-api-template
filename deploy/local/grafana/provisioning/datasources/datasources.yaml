apiVersion: 1

datasources:
# Loki：日志数据源，derivedFields 实现从日志中的 trace_id 跳转到 Jaeger
- name: Loki
  type: loki
  access: proxy
  url: http://loki:3100
  jsonData:
    derivedFields:
    # Collector transform 将 trace_id 追加到 log body（格式：<msg> trace_id=<hex>）
    # 任何含 trace_id 属性的日志都会被追加，regex 提取后跳转 Jaeger
    # 本地 slog 输出格式不受影响（transform 在 Collector 侧完成）
    - datasourceUid: jaeger
      matcherType: regex
      matcherRegex: 'trace_id=(\w+)'
      name: trace_id
      url: "$${__value.raw}"
# Jaeger：Trace 数据源，供 Loki derivedFields 跳转目标
- name: Jaeger
  type: jaeger
  access: proxy
  url: http://jaeger:16686
  uid: jaeger
